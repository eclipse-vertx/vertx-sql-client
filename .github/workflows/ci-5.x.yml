name: vertx-sql-client (5.x)
on:
  push:
    branches:
      - master
      - '5.[0-9]+'
  pull_request:
    branches:
      - master
      - '5.[0-9]+'
jobs:
  CI-CD:
    uses: ./.github/workflows/ci-matrix-5.x.yml
    secrets: inherit
    with:
      branch: ${{ github.event.pull_request.head.sha || github.ref_name }}
